<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생성형 AI 후속질문 연구 참여 안내</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --w: 393px;
    --h: 852px;
    --bg: #ffffff;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-tertiary: #999999;
    --border: #e0e0e0;
    --border-light: #f0f0f0;
    --surface: #f8f8f8;
    --surface-hover: #f2f2f2;
    --accent: #1A1A1A;
    --progress-bg: #ebebeb;
    --progress-fill: #111111;
    --error-color: #d9534f;
    --error-bg: #fff5f5;
    --error-border: #f5a8a6;
    --btn-primary-bg: #1A1A1A;
    --btn-primary-text: #ffffff;
    --card-radius: 12px;
    --input-radius: 10px;
    --btn-radius: 10px;
    --selected-bg: #1A1A1A;
    --selected-text: #ffffff;
    --tag-bg: #f4f4f4;
    --tag-text: #444444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #d8d8d8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* 실제 모바일 기기 접속 시 셸 숨기고 전체화면 */
  @media (max-width: 500px) {
    body {
      background: #ffffff;
      padding: 0;
      align-items: flex-start;
    }
    .device-shell {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    .device-shell::before,
    .device-shell::after {
      display: none !important;
    }
    /* 모바일에서 상태바 숨김 */
    .status-bar {
      display: none !important;
    }
    /* 상태바 없어진 만큼 상단 여백 줄임 */
    .top-nav {
      padding-top: 12px !important;
    }
  }

  .device-shell {
    width: var(--w);
    height: var(--h);
    background: var(--bg);
    border-radius: 50px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3), 0 0 0 7px #1a1a1a, 0 0 0 8.5px #3a3a3a;
    overflow: hidden;
    position: relative;
  }
  .device-shell::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #1a1a1a;
    border-radius: 0 0 20px 20px;
    z-index: 100;
  }
  .device-shell::after {
    content: '';
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px;
    background: #2a2a2a;
    border-radius: 50%;
    box-shadow: 0 0 0 2px #111, 40px 0 0 0 #333;
    z-index: 101;
  }

  .screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    background: var(--bg);
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 38px 28px 8px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 5px; align-items: center; font-size: 12px; color: var(--text-primary); }

  /* Top Nav */
  .top-nav {
    display: flex;
    align-items: center;
    padding: 6px 20px 10px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-back:active { background: var(--surface); }
  .nav-back svg { width: 20px; height: 20px; }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.4px;
    white-space: nowrap;
  }
  .nav-spacer { width: 36px; flex-shrink: 0; }

  /* Progress Bar */
  .progress-wrap {
    padding: 0 20px 0;
    flex-shrink: 0;
    margin-bottom: 4px;
  }
  .progress-track {
    height: 2.5px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--progress-fill);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Scrollable Content */
  .scroll-content {
    flex: 1;
    overflow-y: scroll;
    padding: 0 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    min-height: 0;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Fade bottom */
  .scroll-wrap {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: visible;
  }
  .scroll-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(to top, rgba(255,255,255,0.95), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom CTA */
  .bottom-area {
    padding: 12px 20px 28px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--btn-primary-bg);
    color: var(--btn-primary-text);
    border: none;
    border-radius: var(--btn-radius);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }

  .btn-outline {
    width: 100%;
    padding: 15px;
    background: transparent;
    color: var(--text-primary);
    border: 1.5px solid var(--border);
    border-radius: var(--btn-radius);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.3px;
    margin-top: 10px;
    transition: background 0.15s;
  }
  .btn-outline:active { background: var(--surface); }

  /* Section Title */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.6px;
    margin-bottom: 6px;
    padding-top: 12px;
  }
  .section-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 24px;
    letter-spacing: -0.2px;
  }

  /* Card */
  .card {
    background: var(--bg);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .card-label {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.65;
    letter-spacing: -0.2px;
  }
  .card-selected {
    border-color: var(--accent);
    background: var(--surface);
  }

  /* Form Groups */
  .form-group {
    margin-bottom: 22px;
  }
  .form-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
    display: block;
    letter-spacing: -0.2px;
  }
  .form-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 6px;
    line-height: 1.5;
    letter-spacing: -0.1px;
  }

  /* Choice Buttons */
  .choice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .choice-btn {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    background: var(--bg);
    font-family: inherit;
    font-size: 13.5px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.2px;
    font-weight: 400;
  }
  .choice-btn:active { opacity: 0.7; }
  .choice-btn.selected {
    background: #1A1A1A;
    color: #FFFFFF;
    border-color: #1A1A1A;
  }

  /* Text Input */
  .text-input {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--input-radius);
    font-family: inherit;
    font-size: 16px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: -0.2px;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--text-tertiary); }
  .text-input.error-input { border-color: var(--error-color); }

  .textarea-wrap { position: relative; }
  .text-textarea {
    width: 100%;
    min-height: 200px;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--input-radius);
    font-family: inherit;
    font-size: 16px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    resize: none;
    line-height: 1.7;
    transition: border-color 0.2s;
    letter-spacing: -0.2px;
  }
  .text-textarea:focus { border-color: var(--accent); }
  .text-textarea::placeholder { color: var(--text-tertiary); }
  .text-textarea.error-input { border-color: var(--error-color); }
  .char-count {
    position: absolute;
    bottom: 10px; right: 12px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* Error Message */
  .error-msg {
    display: none;
    font-size: 12.5px;
    color: var(--error-color);
    margin-top: 8px;
    letter-spacing: -0.2px;
    line-height: 1.5;
  }
  .error-msg.visible { display: block; }

  /* Consent */
  .consent-box {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 16px;
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .consent-box::-webkit-scrollbar { display: none; }
  .consent-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
    letter-spacing: -0.1px;
  }
  .consent-check-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 0;
    border-top: 1px solid var(--border-light);
    cursor: pointer;
  }
  .custom-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .custom-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .custom-check.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px);
    display: block;
  }
  .check-label {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.5;
    letter-spacing: -0.2px;
  }

  /* Task Cards */
  .task-card {
    border: 1.5px solid var(--border-light);
    border-left: 4px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .task-card:active { background: #f0f4ff; }
  .task-card.selected {
    border-color: #4a7cdc;
    border-left-color: #4a7cdc;
    background: #f0f4ff;
  }
  .task-card .check-badge {
    display: none;
    position: absolute;
    top: 14px; right: 14px;
    width: 26px; height: 26px;
    background: #4a7cdc;
    border-radius: 50%;
    align-items: center; justify-content: center;
  }
  .task-card.selected .check-badge { display: flex; }
  .task-card .check-badge::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px);
    display: block;
  }
  .task-num {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .task-card.selected .task-num { color: #4a7cdc; }
  .task-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    padding-right: 36px;
  }
  .task-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    letter-spacing: -0.1px;
  }

  /* Question Cards */
  .q-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .q-section-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .q-section-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .q-card {
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
    border-left: 3px solid var(--border-light);
  }
  .q-card:active { background: var(--surface); }
  .q-card:hover { border-left-color: var(--accent); }
  .q-card-text {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.6;
    flex: 1;
    letter-spacing: -0.2px;
  }
  .q-card-arrow {
    color: var(--text-tertiary);
    font-size: 14px;
    flex-shrink: 0;
  }
  .q-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 4px;
    letter-spacing: 0.1px;
    font-weight: 500;
  }

  /* Slider / Bar for Condition B */
  .slider-section {
    margin-bottom: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: var(--card-radius);
    border: 1.5px solid var(--border-light);
  }
  .slider-touch-area {
    padding: 14px 0;
    margin: -14px 0;
    cursor: pointer;
    touch-action: none;
  }
  .slider-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .slider-desc {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
    line-height: 1.5;
    letter-spacing: -0.1px;
  }
  .slider-wrapper {
    position: relative;
    padding: 8px 0;
  }
  .slider-track {
    height: 6px;
    background: #e0e0e0;
    border-radius: 6px;
    position: relative;
    margin: 8px 10px;
    cursor: pointer;
    touch-action: none;
  }
  .slider-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: #666666;
    border-radius: 6px;
    transition: width 0.2s;
    z-index: 1;
  }
  .slider-steps {
    display: flex;
    justify-content: space-between;
    margin: 0 10px;
    margin-top: 10px;
  }
  .slider-step {
    font-size: 12px;
    color: var(--text-tertiary);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    width: 20px;
    text-align: center;
  }
  .slider-step.active {
    color: var(--text-primary);
    font-weight: 800;
    font-size: 15px;
  }
  .slider-knob-row {
    position: absolute;
    top: 0; left: 10px; right: 10px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .slider-knob-pos {
    width: 20px;
    height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: all;
  }
  .slider-knob {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: transform 0.2s;
    display: none;
  }
  .slider-knob.visible { display: block; }
  .slider-thumb {
    position: absolute;
    top: 50%; transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    background: #444444;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    pointer-events: none;
    transition: left 0.15s;
    z-index: 3;
  }
  .slider-end-labels {
    display: flex;
    justify-content: space-between;
    margin: 6px 10px 0;
  }
  .slider-end-label {
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: -0.1px;
  }

  /* Evaluation */
  .eval-item {
    margin-bottom: 18px;
    padding: 14px;
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    transition: border-color 0.2s;
  }
  .eval-item.error-item { border-color: var(--error-border); background: var(--error-bg); }
  .eval-q {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.6;
    margin-bottom: 14px;
    letter-spacing: -0.2px;
  }
  .eval-scale {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .eval-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .eval-nums {
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .eval-num {
    flex: 1;
    padding: 9px 4px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .eval-num.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* AI Response */
  .ai-card {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .ai-card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ai-card-body {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.75;
    letter-spacing: -0.2px;
  }

  /* Selected Q display */
  .selected-q-card {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-left: 3px solid var(--accent);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .selected-q-label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .selected-q-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.65;
    letter-spacing: -0.2px;
    font-weight: 500;
  }

  /* Completion */
  .completion-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    text-align: center;
  }
  .completion-icon {
    width: 64px; height: 64px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    font-size: 28px;
  }
  .completion-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.6px;
    margin-bottom: 10px;
  }
  .completion-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    letter-spacing: -0.2px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border-light);
    margin: 16px 0;
  }

  /* Info Badge */
  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-secondary);

const B_ANSWERS = {
  // ─── 카페 창업 (T1) ───────────────────────────────────────────
  T1_L1_Q1:{q:'카페 창업을 생각하는 사람 중 나와 가장 다른 유형은?',a:'20대 직장인은 "퇴근 후 내 공간"으로 감성 중심 카페를 꿈꾸고, 40대 주부는 아이 학교 보내고 나서 할 수 있는 커뮤니티 중심 카페를 원해요.\n\n전자는 인스타 감성과 혼자만의 좌석이 핵심이고, 후자는 이웃과 대화가 되는 테이블과 동네 단골이 핵심입니다. 같은 "카페 창업"이라도 타깃에 따라 인테리어, 메뉴, 위치 전략이 완전히 달라져요.\n\n나와 가장 다른 유형이 원하는 카페를 상상해보면, 아직 생각 못 했던 콘셉트 방향이 열릴 수 있습니다.'},
  T1_L1_Q2:{q:'카페 창업과 비슷한 어려움이 다른 업종에도 있을까?',a:'카페 창업의 어려움은 유튜브 채널 개설과 구조가 거의 같아요.\n\n"이미 너무 많은 경쟁자", "나만의 콘셉트 찾기", "처음엔 아무도 모른다"는 두려움까지 똑같습니다. 잘 되는 유튜버가 구독자를 먼저 분석하듯, 잘 되는 카페도 단골이 될 사람을 먼저 상상해요.\n\n유튜브에서 성공한 니치 채널의 전략 — 뾰족하게 좁히고, 꾸준히 — 을 카페 콘셉트에 그대로 가져오면 어떨까요?'},
  T1_L1_Q3:{q:'메뉴를 딱 하나만 팔아야 한다면 뭘 팔겠어?',a:'"에스프레소만 파는 카페", "딸기 음료만 파는 카페"처럼 메뉴가 하나면 강력한 정체성이 생겨요.\n\n재료 관리가 쉽고, 품질이 일관되고, 손님에게 기억되기 쉽습니다. 뭘 팔지보다 "왜 이것만 파는가"의 스토리가 더 중요해요. 그 스토리가 SNS 콘텐츠가 되고, 단골이 되고, 브랜드가 됩니다.\n\n지금 생각하는 카페에서 딱 하나만 남긴다면 무엇을 선택하겠어요?'},
  T1_L1_Q4:{q:'동네 카페가 전부 없어진다면 어떤 일이 생길까?',a:'카페가 없어지면 비로소 카페의 진짜 역할이 보입니다.\n\n카페는 단순히 커피를 마시는 곳이 아니라 집도 아니고 회사도 아닌 "제3의 공간"이에요. 혼자 있어도 혼자가 아닌 느낌, 잠깐 도망칠 수 있는 곳. 이게 없어지면 사람들이 얼마나 그 공간을 필요로 했는지 알게 됩니다.\n\n"커피를 파는 것"이 아니라 "그 공간 경험을 파는 것"이라는 관점에서 카페를 다시 설계해보면 어떨까요?'},
  T1_L2_Q1:{q:'창업 컨설턴트 입장에서 가장 흔한 실수가 뭘까?',a:'카페 창업 컨설턴트들이 공통적으로 말하는 가장 흔한 실수는 "위치만 보고 콘셉트를 안 잡는다"예요.\n\n유동인구가 많아도 왜 이 카페여야 하는지 이유가 없으면 가격 경쟁에서 집니다. 전문가들이 가장 먼저 묻는 건 "누가 올 것 같아요?"예요. 타깃이 명확하면 위치도, 메뉴도, 인테리어도 자연스럽게 따라와요.\n\n지금 생각하는 카페의 타깃이 누구인지 먼저 그려보는 게 출발점입니다.'},
  T1_L2_Q2:{q:'카페를 도서관이나 헬스장처럼 설계한다면?',a:'도서관형 카페 — 조용하고 오래 앉아 있을 수 있고, 서로 방해하지 않는 분위기. 음료보다 공간이 목적이 됩니다.\n\n헬스장형 카페 — 회원제로 운영하고, 단골이 오면 바리스타가 이름을 알고 주문을 기억해요. 매일 오는 게 당연한 루틴이 됩니다.\n\n어떤 공간의 느낌을 가져갈지 결정하면, 인테리어·운영 방식·가격 전략이 한 번에 방향이 잡혀요.'},
  T1_L2_Q3:{q:'동네 주민 10명이 함께 운영하는 카페라면?',a:'협동조합 카페는 실제로 있어요. 수익을 나누는 대신 각자 역할을 맡아요 — 바리스타, 인테리어 담당, SNS 담당처럼요.\n\n주인 의식이 생기니 단골이 자동으로 만들어지고, 지인들을 데려와요. "내 카페"가 아니라 "우리 카페"라는 개념이 되면, 손님과 운영자의 경계가 흐려지고 커뮤니티 공간으로 진화합니다.\n\n이 구조가 카페를 넘어 동네 플랫폼이 되는 시작점이 될 수 있어요.'},
  T1_L2_Q4:{q:'이 카페를 학교 안이나 회사 구내식당처럼 만든다면?',a:'학교 안 카페 — 쉬는 시간마다 오고, 시험기간엔 공부방이 돼요. 메뉴는 가볍고 빠른 것 중심, 분위기는 시끄러워도 괜찮은 구조가 필요합니다.\n\n회사 구내식당형 — 직원들이 매일 이용하는 구조라 안정적인 매출이 생겨요. 대신 빠른 서비스와 메뉴 다양성이 핵심입니다.\n\n같은 카페라도 어떤 맥락에 놓이느냐에 따라 성공의 기준이 완전히 달라집니다.'},
  T1_L3_Q1:{q:'오픈 첫날 손님이 한 명도 없다면 그 순간 가장 먼저 해야 할 건?',a:'지금 당장 카페 앞에 나가서 지나가는 사람한테 직접 말을 거는 겁니다.\n\n"오늘 오픈했는데 음료 한 잔 드려도 될까요?" SNS 광고나 전단지보다 그 한 마디가 첫 단골을 만드는 데 훨씬 효과적이에요. 첫 손님이 주변 지인에게 직접 말하는 입소문이 어떤 마케팅보다 강합니다.\n\n긴박한 상황에서 살아남는 건 준비된 전략이 아니라 지금 당장의 행동입니다.'},
  T1_L3_Q2:{q:'단골이 될수록 특별 대우를 받는 레벨 시스템을 만든다면?',a:'방문 횟수에 따라 "방문 손님 → 단골 → VIP → 공동 기획자"처럼 역할이 바뀌어요.\n\nVIP는 신메뉴 시식권, 공동 기획자는 메뉴 이름 짓기 참여. 스탬프 카드보다 훨씬 강한 재방문 동기가 생깁니다. 레벨이 높아질수록 손님이 카페의 일부가 되는 구조예요.\n\n이게 가장 충성도 높은 커뮤니티를 만드는 방법이고, 마케팅 비용 없이 입소문이 생기는 구조입니다.'},
  T1_L3_Q3:{q:'손님이 하루에 딱 한 번만 올 수 있다면 그 한 번을 어떻게 만들까?',a:'"오늘 가장 기억에 남을 카페 경험"을 설계하는 관점으로 바뀌어요.\n\n커피 맛보다 바리스타가 손님 이름을 기억하는 것, 항상 같은 자리가 비어있는 것, 좋아하는 음악이 나오는 것이 더 중요해집니다. 한 번의 방문을 완벽하게 만드는 요소가 무엇인지 알면, 매일 오고 싶은 카페가 됩니다.\n\n"한 번이라도 잊지 못할 경험"이 최고의 마케팅이에요.'},
  T1_L3_Q4:{q:'메뉴판과 가격표를 절대 보여줄 수 없다면 카페가 어떻게 될까?',a:'바리스타가 손님에게 질문을 해요. "달달한 게 좋아요, 쓴 게 좋아요?", "지금 기분이 어때요?"를 듣고 그날 그 사람만을 위한 음료를 만들어줍니다.\n\n카페가 "음료 판매소"가 아니라 "개인 맞춤 경험 공간"이 돼요. 가격 투명성은 없지만 오히려 신뢰가 더 생기는 경우도 있어요. "얼마예요?"가 아니라 "오늘은 뭘 만들어줄까요?"가 대화의 시작이 되는 구조입니다.'},
  T1_L4_Q1:{q:'편하게 쉬는 공간이 아니라 일부러 불편하게 설계된 카페라면?',a:'의자가 딱딱한 카페, WiFi가 없는 카페, 혼자서는 들어올 수 없는 2인 이상 카페 — 실제로 이런 곳이 있어요.\n\n처음엔 불만이지만 "왜 그런가" 이유를 알면 오히려 더 특별한 경험이 됩니다. "불편함"이 콘셉트가 되면, 그 불편함을 일부러 경험하러 오는 손님이 생겨요. 이게 바이럴의 핵심이 될 수 있습니다.\n\n"생산적 마찰" — 너무 편하면 기억에 안 남고, 적당한 저항이 있어야 기억에 남아요.'},
  T1_L4_Q2:{q:'날씨 데이터로 그날 메뉴를 예측해서 결정하는 카페라면?',a:'비 오는 날엔 따뜻한 음료, 무더운 날엔 아이스 음료 수요 패턴을 데이터로 잡아요.\n\n"오늘 날씨 기반 추천 메뉴"를 당일 메뉴로 자동 조정하거나, 재료 발주를 미리 최적화할 수 있어요. 손님에게도 "오늘의 날씨 메뉴"로 보여주면 재미있는 경험이 됩니다.\n\n날씨 예보처럼 "틀릴 수 있지만 참고할 만한 정보"를 활용하는 것 자체가 카페만의 콘텐츠가 될 수 있어요.'},
  T1_L4_Q3:{q:'주문을 말이나 글 대신 그림이나 손짓으로만 받는다면?',a:'메뉴판이 그림책처럼 되고, 손님이 카드를 가리켜서 주문해요.\n\n언어 장벽이 없어서 외국인 관광객이 많은 지역에서 강점이 생기고, 청각장애인도 편하게 이용할 수 있어요. 주문 자체가 하나의 놀이 경험이 됩니다. "특이한 카페"로 입소문이 퍼지는 효과도 있어요.\n\n말을 못해도 되는 안도감, 이 방식이 의외로 내향적인 손님들에게 큰 매력이 될 수 있습니다.'},
  T1_L4_Q4:{q:'커피를 아예 팔지 않는 카페라면 무엇으로 승부할까?',a:'공간을 파는 게 됩니다.\n\n시간제 좌석 대여, 조용한 작업 공간, 개인 사물함, 낮잠 공간처럼요. 커피가 없으니 음료 원가도 없고, 재고 관리도 없어요. "커피 없는 카페"라는 역설적인 콘셉트 자체가 SNS 화제가 되고, 진짜로 공간이 필요한 사람들의 단골 공간이 될 수 있습니다.\n\n"무엇을 파느냐"가 아니라 "어떤 경험을 파느냐"로 프레임이 바뀌는 거예요.'},
  T1_L5_Q1:{q:'손님을 환영하는 대신 일부러 까다롭게 입장을 막는 카페라면?',a:'예약제만 받는 카페, 조용히 있겠다는 서약서를 써야 들어갈 수 있는 카페, 인터뷰를 통과한 회원만 이용할 수 있는 카페 — 실제로 존재해요.\n\n희소성이 생기면 오히려 더 가고 싶어집니다. "아무나 오는 곳"이 아니라 "나도 그 기준을 통과하고 싶다"는 심리가 강력한 팬덤을 만들어요.\n\n입장 조건이 까다로울수록 들어갔을 때의 특별함이 커지고, 그 경험을 공유하고 싶어지는 구조가 됩니다.'},
  T1_L5_Q2:{q:'망한 카페들의 공통점만 모아서 만든 카페는 어떤 모습일까?',a:'"주차 전혀 없는 골목", "촌스러운 인테리어", "불친절한 바리스타", "비싼 가격" — 이걸 전부 일부러 갖추면 어떨까요?\n\n실제로 "일부러 불친절한 콘셉트"의 카페가 화제가 된 사례가 있어요. 가장 망할 것 같은 요소가 역설적으로 강점이 되는 순간이 있습니다. 망한 카페에서 배우는 게 성공한 카페에서 배우는 것보다 더 많을 수 있어요.\n\n어떤 "망한 요소"를 역발상하면 새로운 콘셉트가 나올까요?'},
  T1_L5_Q3:{q:'손님이 원하는 음료를 절대 만들어주지 않는 카페라면?',a:'바리스타가 오늘의 한 가지 음료만 만들어요. 선택권이 없으니 고민할 필요도 없고, "오늘의 음료"를 기다리는 설렘이 생깁니다.\n\n매일 달라지는 메뉴가 SNS 콘텐츠가 되고, "오늘은 뭘 만들어줄까" 궁금해서 다시 오게 돼요. 역설적으로, 선택권을 없앤 카페가 더 강렬한 경험을 만들 수 있습니다.\n\n"선택의 역설" — 너무 많은 선택지가 오히려 만족도를 낮춘다는 심리학 원리를 카페 경험에 적용한 거예요.'},
  T1_L5_Q4:{q:'10년 후 이 카페가 망했다면, 그 이유는 뭐였을까?',a:'가장 가능성 높은 이유 세 가지예요.\n\n첫째, 콘셉트를 따라 하는 카페가 너무 많아져서 차별점이 사라졌다. 둘째, 오너가 지쳐서 처음의 열정과 퀄리티를 유지하지 못했다. 셋째, 트렌드가 바뀌었는데 메뉴와 분위기를 바꾸지 않아 손님이 떠났다.\n\n이 실패 이유를 미리 알면 — 콘셉트의 핵심 가치는 지키되 표현 방식은 계속 바꾸는 구조, 오너 번아웃을 방지하는 운영 루틴을 지금부터 설계할 수 있습니다.'},

  // ─── 반려동물 서비스 (T2) ──────────────────────────────────────
  T2_L1_Q1:{q:'반려동물을 키우는 사람 중 나와 가장 다른 유형은?',a:'강아지를 가족처럼 여기며 매일 산책하고 정기검진을 철저히 하는 "집사형"과, 고양이를 자유롭게 두고 최소한만 챙기는 "방목형"은 완전히 달라요.\n\n전자는 상세한 케어 정보와 커뮤니티 기능이 필요하고, 후자는 간단한 알림과 위급 상황 대처 기능만 원합니다. 어떤 유형의 보호자를 타깃하느냐에 따라 서비스의 핵심 기능이 완전히 달라져요.\n\n나와 가장 다른 보호자가 원하는 것이 뭔지 상상해보면, 아직 생각 못 한 기능이 보일 수 있어요.'},
  T2_L1_Q2:{q:'반려동물 돌봄의 어려움과 비슷한 상황이 다른 곳에도 있을까?',a:'반려동물 돌봄의 어려움은 육아와 구조가 거의 같아요.\n\n말을 못 하는 대상을 돌봐야 하고, 위급 상황의 불안감, 어느 전문가를 믿어야 할지 모르는 막막함이 공통적입니다. 육아 앱에서 잘 작동하는 것들 — 성장 기록, 증상 체크리스트, 전문가 Q&A — 을 반려동물 앱에 가져오면 어떨까요?\n\n이미 검증된 다른 분야의 솔루션을 가져오면 처음부터 만들 필요가 없습니다.'},
  T2_L1_Q3:{q:'이 서비스에서 딱 한 가지 기능만 남긴다면 뭘까?',a:'"지금 이 증상, 병원 가야 할까?" 판단 기능 하나예요.\n\n보호자가 가장 불안한 순간은 반려동물이 갑자기 이상해 보일 때예요. 새벽에 갑자기 구토를 했다, 밥을 안 먹는다, 다리를 절뚝거린다. 이때 "병원 가야 하는지, 기다려도 되는지" 판단을 도와주는 기능 하나만 있어도 엄청난 가치가 생깁니다.\n\n가장 자주 필요한 순간의 기능이 핵심 기능입니다.'},
  T2_L1_Q4:{q:'반려동물 관련 불편함이 10배 심해진다면 어떤 일이 생길까?',a:'병원비가 너무 비싸서 치료를 포기하고 유기하는 사례가 늘고, 펫시터를 믿지 못해 여행을 아예 못 가는 사람이 생겨요. 잘못된 정보로 반려동물이 건강을 잃는 경우도 급증합니다.\n\n유기동물 문제가 사회적 재난이 되고, 반려동물과 함께할 수 있는 공간이 줄어들게 돼요. 이 극단 상황에서 "절대로 있어야 할 것"이 무엇인지 생각해보면, 지금 만들어야 할 서비스의 진짜 핵심 기능이 보입니다.'},
  T2_L2_Q1:{q:'수의사나 펫시터 입장에서 보호자들의 가장 흔한 실수는?',a:'수의사들이 공통적으로 하는 말이 있어요 — "보호자들이 너무 늦게 데려온다"입니다.\n\n초기 증상일 때 왔으면 쉽게 치료했을 것들이, "조금만 더 지켜보자"다가 악화돼서 옵니다. 반대로 아무 이상이 없는데 불안해서 매주 오는 경우도 있어요. 수의사가 가장 원하는 건 "보호자가 어느 정도 증상 판단을 할 수 있는 것"입니다.\n\n이게 서비스의 핵심 방향이 될 수 있어요.'},
  T2_L2_Q2:{q:'반려동물 서비스를 공원이나 도서관 같은 공간으로 만든다면?',a:'공원형 서비스 — 같은 동네 반려인들이 모이는 커뮤니티가 돼요. 정보 공유, 산책 메이트, 보호자 모임이 자연스럽게 생깁니다.\n\n도서관형 서비스 — 필요할 때 조용히 찾아와서 정보를 얻고 가는 공간이에요. 커뮤니티보다 정보 품질이 핵심입니다.\n\n어떤 공간의 느낌을 가져갈지 결정하면, 서비스의 톤앤매너와 기능 우선순위가 한 번에 정해집니다.'},
  T2_L2_Q3:{q:'동네 반려인 10명이 함께 돌봄 네트워크를 만든다면?',a:'서로 바쁠 때 대신 산책해주고, 갑자기 입원하면 돌봐주는 구조가 생겨요.\n\n신뢰할 수 있는 이유가 생깁니다 — 모르는 펫시터가 아니라 이미 아는 이웃이니까요. 비용도 줄고, 반려동물도 이미 친한 사람에게 맡겨지니 스트레스가 적어요. "돌봄 품앗이" 개념을 앱으로 만들면 새로운 반려동물 서비스 카테고리가 생깁니다.'},
  T2_L2_Q4:{q:'동물병원 체인이나 펫샵 프랜차이즈에서 이 서비스를 운영한다면?',a:'동물병원 체인 연결 — 진료 예약, 건강 기록, 처방 내역이 하나의 앱에서 관리돼요. 병원 입장에서도 재방문율이 올라가니 win-win입니다.\n\n펫샵 프랜차이즈 연결 — 사료 정기 배송, 용품 구매, 그루밍 예약까지 연결되는 라이프스타일 플랫폼이 돼요.\n\n어떤 파트너와 연결하느냐에 따라 서비스의 수익 모델과 경쟁 구도가 완전히 달라집니다.'},
  T2_L3_Q1:{q:'반려동물이 갑자기 위급한 상황에서 가장 먼저 필요한 기능은?',a:'"지금 당장 갈 수 있는 가장 가까운 야간 동물병원 위치"와 "지금 이 증상이 응급인지 아닌지 판단" — 이 두 가지가 30초 안에 해결되면 나머지는 보호자가 알아서 할 수 있어요.\n\n복잡한 기능보다 위급 상황의 딱 그 순간을 위한 기능 하나가 서비스 전체의 존재 이유가 될 수 있습니다. 가장 무서운 순간에 가장 빠르게 작동하는 것, 그게 신뢰를 만들어요.'},
  T2_L3_Q2:{q:'반려동물 건강 관리를 게임 레벨처럼 만든다면?',a:'"오늘 산책 30분 완료!", "이번 달 정기검진 달성!", "예방접종 기록 3개 입력!" 처럼 미션이 생겨요.\n\n달성하면 쿠폰이나 병원 할인권을 받고, 동네 반려인들과 건강 점수를 비교할 수 있어요. 귀찮은 건강 관리가 "오늘 미션 클리어" 느낌으로 바뀌면 지속률이 달라집니다. 게임화의 핵심은 작은 성취감을 자주 주는 것, 그리고 비교 대상을 만드는 겁니다.'},
  T2_L3_Q3:{q:'이 서비스를 하루에 딱 한 번만 열 수 있다면 그 한 번에 뭘 볼까?',a:'"오늘 밥 줬나요?", "오늘 산책했나요?", "이상한 증상이 있나요?" 딱 세 가지 체크 후 끝. 5초면 충분합니다.\n\n제약이 생기면 핵심만 남아요. 지금 이 앱에서 하루 한 번 확인할 가장 중요한 정보가 뭔지 알면, 메인 화면 설계가 자연스럽게 결정됩니다. 하루 한 번의 습관이 가장 강력한 돌봄 도구가 돼요.'},
  T2_L3_Q4:{q:'수의사가 절대 진단을 내려주지 않는 앱이라면 어떻게 작동할까?',a:'"어제 먹은 것 중 평소와 다른 게 있었나요?", "구토가 몇 번이나 있었나요?", "물은 얼마나 마셨나요?" 보호자가 이 질문에 답하다 보면 원인을 스스로 파악하게 됩니다.\n\n이 구조에서 앱의 가치는 "정답을 주는 것"이 아니라 "보호자가 올바른 질문을 하게 돕는 것"이에요. 그게 결국 더 정확한 진료로 이어지고, 보호자 스스로 판단력을 키우게 됩니다.'},
  T2_L4_Q1:{q:'보호자를 편하게 돕는 대신 일부러 불편하게 만드는 앱이라면?',a:'산책 기록을 입력하지 않으면 다음 기능을 쓸 수 없는 구조예요.\n\n귀찮지만, 그 과정에서 "내가 오늘 산책을 빠뜨렸다"는 것을 명확히 인식하게 됩니다. 편리한 앱은 그냥 넘어가게 하지만, 적당히 불편한 앱은 행동 변화를 유도해요. "생산적 마찰"이 반려동물 건강 관리 앱에서 가장 강력한 기능이 될 수 있습니다.'},
  T2_L4_Q2:{q:'반려동물 건강을 날씨 예보처럼 매일 알려준다면?',a:'"오늘 활동량이 평소보다 30% 낮고 식사량도 줄었습니다. 건강 주의 확률 40%"처럼요.\n\n매일 아침 반려동물의 "오늘 컨디션 예보"를 보여주고, 일주일 패턴으로 이상 징후를 미리 알려줍니다. 예보처럼 틀릴 수 있지만 참고할 수 있는 정보, 그 불확실성을 투명하게 보여주는 것이 오히려 신뢰를 만들어요.'},
  T2_L4_Q3:{q:'반려동물 증상을 말 대신 그림이나 이모지로만 전달하는 서비스라면?',a:'강아지 몸 실루엣에서 아픈 부위를 터치하고, 증상 이모지를 선택해요. "구토 🤢", "기침 😮", "다리 절뚝 🦵"처럼요.\n\n의학 용어를 몰라도 되고, 어린 아이도 반려동물 증상을 기록할 수 있어요. 비언어 인터페이스는 언어 장벽도 없애주고, 무엇보다 정확한 부위와 증상을 더 빠르게 전달할 수 있습니다.'},
  T2_L4_Q4:{q:'동물병원 예약 기능을 없애면 이 서비스에 남는 가치는 뭘까?',a:'같은 반려동물을 키우는 사람들과의 연결이에요.\n\n비슷한 품종, 비슷한 나이, 같은 동네. 서로의 경험을 나누고, 좋은 병원을 추천하고, 펫시터를 소개하는 커뮤니티. 이게 사실 보호자들이 가장 필요로 하는 것일 수 있어요. "병원 예약 앱"이 아니라 "반려동물 육아 동지 네트워크"라는 완전히 다른 포지션이 됩니다.'},
  T2_L5_Q1:{q:'보호자를 돕는 대신 반려동물이 보호자를 평가하는 앱이라면?',a:'뒤집으면 "보호자 행동을 분석해서 피드백 주는 앱"이 돼요.\n\n"이번 달 산책 횟수가 지난달보다 30% 줄었어요", "예방접종이 2개월 지연됐어요". 보호자가 자신의 돌봄 패턴을 객관적으로 보게 됩니다. "반려동물 건강"이 아니라 "보호자의 돌봄 습관"을 관리하는 완전히 새로운 관점이에요.'},
  T2_L5_Q2:{q:'가장 말이 안 되는 반려동물 서비스 아이디어만 모으면?',a:'"반려동물끼리 채팅하는 앱", "강아지가 직접 사료를 주문하는 앱", "반려동물 전용 SNS".\n\n마지막 것은 실제로 있어요. 황당한 아이디어를 뒤집으면 — "반려동물 중심으로 보호자가 연결되는 플랫폼"이라는 진지한 서비스가 됩니다. 가장 황당한 것에서 역발상하면, 기존에 없던 새로운 서비스 카테고리가 나올 수 있어요.'},
  T2_L5_Q3:{q:'보호자가 원하는 정보를 절대 바로 주지 않는 앱이라면?',a:'"우리 강아지 지금 이상한데요"라고 입력하면 즉시 답 대신 질문이 와요.\n\n"어제 뭘 먹었나요?", "마지막으로 산책한 게 언제예요?", "대소변은 정상인가요?" 이 과정에서 보호자 스스로 원인을 파악하게 돼요. 의존적인 앱이 아니라 판단력을 키워주는 앱. 장기적으로 이게 더 가치 있는 서비스입니다.'},
  T2_L5_Q4:{q:'10년 후 이 반려동물 서비스가 망했다면, 그 이유는?',a:'가장 가능성 높은 이유는 "신뢰 문제"예요.\n\n펫시터 사고 한 번, 잘못된 건강 정보 한 번으로 서비스 전체가 흔들립니다. 또는 대형 플랫폼이 비슷한 기능을 무료로 내놓으면 경쟁이 안 되는 경우도 있어요. "앱보다 동네 수의사가 더 믿을 만하다"는 인식이 퍼지면 사용자가 돌아서기도 합니다.\n\n이 실패를 피하려면 — 검증된 정보 구조와 대형 플랫폼이 따라하기 어려운 특화 커뮤니티를 지금부터 만들어야 합니다.'},

  // ─── 1인 가구 앱 (T3) ─────────────────────────────────────────
  T3_L1_Q1:{q:'혼자 사는 사람 중 나와 가장 다른 유형은 어떤 사람일까?',a:'"선택해서 혼자 사는 사람" — 혼자가 편하고, 자신만의 공간을 즐겨요. 필요한 건 편의성과 효율성입니다.\n\n"어쩔 수 없이 혼자 사는 사람" — 외롭고, 아플 때 가장 힘들어요. 필요한 건 연결과 안전이에요. 같은 "1인 가구 앱"이라도 누구를 위한 앱인지에 따라 핵심 기능이 완전히 달라집니다.\n\n나와 가장 다른 1인 가구를 위해 설계한다면 어떤 기능이 필요할까요?'},
  T3_L1_Q2:{q:'1인 가구의 어려움과 비슷한 상황이 다른 곳에도 있을까?',a:'혼자 사는 어려움은 해외 여행자의 상황과 구조가 비슷해요.\n\n낯선 환경에서 혼자 모든 걸 해결해야 하고, 도움 요청할 사람이 가까이 없고, 언제 뭔가 잘못될지 모른다는 불안감. 여행 앱이 해결한 것들 — 근처 정보 빠르게 찾기, 긴급 상황 대처 — 을 1인 가구 일상에 적용하면 어떨까요?\n\n이미 검증된 여행 앱의 UX를 일상 버전으로 만드는 것이 출발점이 될 수 있어요.'},
  T3_L1_Q3:{q:'이 앱에서 딱 한 가지 기능만 남긴다면 뭘 남길까?',a:'"오늘 아무 일 없었어요" 버튼 하나예요.\n\n매일 아침 버튼을 누르면 가족이나 지인에게 자동으로 "오늘 괜찮아요" 알림이 가요. 12시간 이상 누르지 않으면 "확인 요청" 알림이 지정 연락처에 가고요. 가장 단순하지만, 혼자 사는 사람의 가장 근본적인 불안 — "아무도 모르게 쓰러지면 어쩌지" — 를 해결합니다.'},
  T3_L1_Q4:{q:'1인 가구 어려움이 10배 심해진다면 어떤 일이 생길까?',a:'고독사가 사회적 재난 수준이 돼요.\n\n아파서 병원에 못 가는 사람, 밥을 굶는 사람, 정신건강이 무너지는 사람이 급증합니다. 1인 가구를 지원하는 인프라가 없다는 게 사회 문제로 터지고, 국가가 개입해야 하는 수준이 돼요.\n\n이 극단 상황에서 "절대로 있어야 할 것"을 상상해보면, 지금 만들어야 할 기능의 우선순위가 보입니다.'},
  T3_L2_Q1:{q:'1인 가구를 지원하는 복지 전문가 입장에서 가장 시급한 문제는?',a:'복지 전문가들이 공통적으로 말하는 게 있어요 — "혼자 사는 사람들은 도움 요청을 잘 못 한다"입니다.\n\n민폐를 끼칠까봐, 약해 보일까봐, 어디에 도움 요청을 해야 하는지 몰라서요. 서비스에서 가장 중요한 건 "도움 요청의 문턱을 낮추는 것"입니다. 거창한 신청서가 아니라 "지금 힘들어요" 버튼 하나로 연결되는 구조가 필요해요.'},
  T3_L2_Q2:{q:'이 앱을 편의점이나 동네 슈퍼 같은 공간으로 만든다면?',a:'편의점형 앱 — 매일 들르는 곳, 필요한 것만 빠르게 해결하는 곳이에요. 24시간 열려있고, 부담 없이 들를 수 있어야 합니다.\n\n동네 슈퍼형 앱 — 주인이 얼굴을 알고, "오늘 안 좋아 보여요"라고 먼저 말을 걸어주는 공간이에요. 기술이 아니라 관계가 핵심입니다.\n\n1인 가구가 매일 필요로 하는 것을 생각하면, 어떤 공간에 가까워야 할지 결정됩니다.'},
  T3_L2_Q3:{q:'혼자 사는 사람 10명이 공동체로 연결된다면 어떤 기능이 필요할까?',a:'"돌봄 품앗이" 구조가 생겨요.\n\n한 명이 아플 때 다른 사람이 약을 대신 사다주고, 누군가 집을 비울 때 택배를 대신 받아주고, 외출이 어려울 때 장을 같이 봐줘요. 서로 다 알 필요도 없고, 필요할 때만 연결되는 구조예요. "이웃"이라는 개념을 디지털로 복원하는 것이 1인 가구 앱의 가장 강력한 기능이 될 수 있습니다.'},
  T3_L2_Q4:{q:'이 앱을 회사 복지나 공공기관 서비스로 만든다면?',a:'회사 복지 프로그램 — 혼자 사는 직원의 긴급 상황 연락망, 야식 배달 지원, 정신건강 상담 연결을 회사가 앱으로 제공해요.\n\n공공기관 서비스 — 1인 가구 등록제와 연계해서, 안부 확인, 긴급 방문, 복지 연결을 자동화할 수 있어요. 개인 앱이 아니라 B2B나 B2G 모델로 전환하면 수익 구조와 사회적 영향력이 동시에 생깁니다.'},
  T3_L3_Q1:{q:'혼자 살다 갑자기 위급 상황이 생겼을 때 가장 먼저 필요한 건?',a:'"지금 내 위치 파악"과 "신뢰할 수 있는 사람에게 즉시 연락" — 이 두 가지예요.\n\n119에 전화할 수 없는 상황이라면, 버튼 하나로 지정 연락처에 현재 위치가 자동 발송되는 기능이에요. 복잡한 기능이 아닌, 위급한 그 순간의 딱 그 기능 하나가 서비스의 존재 이유가 됩니다.'},
  T3_L3_Q2:{q:'1인 생활을 게임처럼 레벨업 구조로 만든다면?',a:'"이번 주 혼자 밥 3번 해먹기", "이웃과 대화 한 번 해보기", "병원 정기검진 예약하기" 미션을 클리어하면 "자립 레벨"이 올라갑니다.\n\n외롭고 힘든 1인 생활이 "성장의 과정"으로 프레이밍되면, 긍정적인 자기 효능감이 생기고 지속 사용 동기도 높아집니다. 레벨이 높아질수록 커뮤니티 역할도 바뀌는 구조라면 장기 사용을 유도할 수 있어요.'},
  T3_L3_Q3:{q:'이 앱을 하루에 딱 한 번만 열 수 있다면 그 한 번에 뭘 확인할까?',a:'"오늘 밥 먹었나요?", "오늘 누구랑 대화했나요?", "오늘 가장 힘든 것은?" 딱 세 가지 체크.\n\n이 간단한 체크인이 누적되면 나의 생활 패턴이 보이고, 언제 가장 힘든지도 알 수 있어요. 하루 한 번의 습관이 쌓이면 가장 강력한 자기 돌봄 도구가 됩니다.'},
  T3_L3_Q4:{q:'앱이 절대 해결책을 주지 않고 질문만 던진다면 어떻게 될까?',a:'"밥을 못 먹겠다"고 하면 "마지막으로 맛있게 먹었던 게 언제예요?", "지금 가장 먹고 싶은 게 뭐예요?"라고 되물어요.\n\n답하다 보면 스스로 "그거 시켜 먹으면 되겠다"는 답을 찾게 됩니다. 해결책을 주는 앱이 아니라 스스로 생각하게 돕는 앱. 장기적으로 더 자립적인 생활 습관을 만들어줍니다.'},
  T3_L4_Q1:{q:'혼자 사는 걸 편하게 돕는 대신 일부러 불편하게 만든다면?',a:'배달 주문 전에 "오늘 직접 요리하면 어떨까요?"라는 팝업이 뜨거나, 혼자 보내는 시간이 너무 길면 "이웃에게 안부 메시지 보내기"를 제안해요.\n\n귀찮지만, 그 작은 마찰이 더 건강한 생활 습관으로 이어질 수 있어요. 편리함이 오히려 고립을 심화시키는 역설을 막는 구조입니다.'},
  T3_L4_Q2:{q:'"오늘 외로울 확률 70%"처럼 감정 상태를 날씨 예보처럼 알려준다면?',a:'수면 패턴, 외출 횟수, SNS 사용 시간 같은 데이터를 분석해서 오늘 기분을 미리 예측해요.\n\n"오늘 기분이 낮을 수 있어요. 좋아하는 음악을 미리 틀어두는 건 어떨까요?" 같은 선제적 제안이 가능해집니다. 감정 예보는 틀릴 수 있지만, 자신의 패턴을 인식하게 만드는 것 자체가 가치 있는 경험입니다.'},
  T3_L4_Q3:{q:'이모지와 색깔로만 오늘 상태를 표현하는 앱이라면?',a:'오늘 기분 이모지 하나, 오늘 에너지 색깔 하나를 선택하면 끝이에요.\n\n말로 설명하기 어려운 감정도 "🌧️ 파란색"으로 표현할 수 있고, 그게 누적되면 나의 감정 패턴이 시각적으로 보입니다. 텍스트 입력의 부담 없이 매일 할 수 있는 체크인, 이게 1인 가구의 정신건강 관리 앱으로 발전할 수 있어요.'},
  T3_L4_Q4:{q:'음식 배달 기능을 없애면 이 1인 가구 앱에 남는 가치는 뭘까?',a:'"오늘 밥 같이 먹을 이웃 찾기", "집밥 나눔 신청", "근처 혼밥 식당 추천". 배달이 아니라 사람과 음식을 연결하는 앱이 됩니다.\n\n1인 가구의 식사 문제를 "편의 서비스"가 아니라 "관계 회복"으로 접근하는 완전히 다른 관점이에요. 배달을 없애면 오히려 더 본질적인 가치가 남습니다.'},
  T3_L5_Q1:{q:'사용자를 편하게 돕는 대신 스스로 해결하게 방치한다면?',a:'처음엔 불안하지만, 결국 "나도 할 수 있다"는 자신감이 생겨요.\n\n가이드 없이 직접 부딪히게 하되, 너무 힘들 때만 도움을 주는 구조예요. 과보호하는 앱이 아니라 독립심을 키워주는 앱. 역설적으로 더 오래 쓰게 되는 서비스가 될 수 있습니다.'},
  T3_L5_Q2:{q:'가장 말이 안 되는 1인 가구 앱 아이디어만 모으면?',a:'"혼자 밥 먹을 때 AI가 옆에서 대화해주는 앱", "냉장고 속 재료로 AI가 자동으로 밥을 시켜주는 앱".\n\n첫 번째는 황당하지만 뒤집으면 "외로운 식사 시간을 채워주는 대화 서비스"가 되고, 이미 비슷한 서비스가 존재해요. 황당한 아이디어에서 진짜 니즈를 발견하면, 아무도 생각 못 한 새로운 서비스가 나옵니다.'},
  T3_L5_Q3:{q:'사용자가 원하는 정보를 절대 바로 주지 않는 앱이라면?',a:'"배달 주문하고 싶어요"라고 하면 "오늘 기분이 어때서 배달하고 싶어요?"라고 되물어요.\n\n처음엔 짜증나지만, 답하다 보면 "아 오늘 지쳐서 그런 거구나"를 스스로 깨닫고, 배달 대신 산책을 선택하는 경우도 생깁니다. 의존을 줄이고 자기 인식을 높이는 앱. 이게 1인 가구의 장기적인 웰빙에 더 기여하는 방향이에요.'},
  T3_L5_Q4:{q:'10년 후 이 1인 가구 앱이 망했다면, 그 이유는?',a:'가장 가능성 높은 이유는 "앱이 오히려 고립을 심화시켰다"예요.\n\n배달, 비대면 서비스가 너무 편해지면서 혼자 사는 사람들이 이웃과 더 단절됐습니다. 앱 덕분에 밖에 나가지 않아도 되니 고독이 더 깊어졌다는 비판을 받게 돼요. 또는 개인정보 문제나 보안 사고 한 번으로 신뢰를 잃는 경우도 있어요.\n\n이 실패를 피하려면 — 편의 기능과 함께 오프라인 연결을 유도하는 기능을 처음부터 설계에 포함시켜야 합니다.'},

  // ─── 환경 캠페인 (T4) ─────────────────────────────────────────
  T4_L1_Q1:{q:'환경에 관심 있는 사람 중 나와 가장 다른 유형은?',a:'"실천형" — 텀블러 들고 다니고, 분리수거 철저히 하고, 비건 식단 시도하는 사람.\n\n"관심형" — 환경이 중요하다는 건 알지만 실제로 행동 변화는 없는 사람. 후자가 훨씬 많아요. "관심형"을 "실천형"으로 바꾸는 것이 캠페인의 핵심 과제입니다. 이미 환경에 관심 있는 사람보다, 아직 실천하지 않는 사람에게 어떻게 다가갈지가 더 중요해요.'},
  T4_L1_Q2:{q:'환경 캠페인과 구조가 비슷한 캠페인이 다른 분야에도 있을까?',a:'헌혈 캠페인 — 처음엔 무서워서 안 하지만, 주변에서 하는 걸 보면 따라하게 돼요. 금연 캠페인 — 건강 위협보다 "이렇게 하면 된다"는 구체적인 방법이 효과적이에요.\n\n이 캠페인들의 성공 요소를 환경 캠페인에 그대로 가져오면 어떨까요? 이미 검증된 행동 변화 캠페인의 전략을 환경에 적용하는 것이 가장 빠른 길입니다.'},
  T4_L1_Q3:{q:'딱 한 가지 메시지만 전달해야 한다면 뭘 전달할까?',a:'"오늘 딱 하나만"이에요.\n\n환경 캠페인이 실패하는 이유 중 하나는 너무 많은 것을 요구하기 때문입니다. 분리수거, 텀블러, 대중교통, 채식, 에너지 절약... 한꺼번에 다 하라고 하면 아무것도 안 하게 돼요. "오늘 딱 하나만. 뭐든 좋아요." 이 메시지 하나가 실제 참여율을 가장 높이는 데 효과적일 수 있습니다.'},
  T4_L1_Q4:{q:'환경 문제가 10배 심각해진다면 캠페인은 어떻게 바뀔까?',a:'지금처럼 "하면 좋은 것"이 아니라 "하지 않으면 벌칙이 생기는" 구조가 됩니다.\n\n탄소세, 플라스틱 사용 제한, 자동차 운행 제한처럼요. 지금은 자발적 참여를 유도하는 캠페인이지만, 강제성이 생기기 전에 자발적 문화를 만들어야 한다는 긴박감이 생깁니다. 그 긴박감을 지금 캠페인의 톤으로 활용할 수 있어요.'},
  T4_L2_Q1:{q:'환경 캠페인 전문가 입장에서 가장 흔한 실패 원인은?',a:'"죄책감에 의존하는 것"이에요.\n\n"지구가 망하고 있어요" 식의 메시지는 단기적으로 관심을 끌지만, 장기적으로 무력감을 줍니다. 너무 심각하면 오히려 외면하게 돼요. 성공하는 캠페인은 "이렇게 하면 멋있어요", "이게 트렌드예요"처럼 긍정적인 프레임을 씁니다. 두려움보다 희망이 행동을 더 오래 지속시킵니다.'},
  T4_L2_Q2:{q:'환경 캠페인을 플리마켓이나 마라톤 같은 행사로 만든다면?',a:'플리마켓형 — 중고 물건 교환, 친환경 제품 판매, 환경 체험 부스가 생겨요. 설명을 듣는 게 아니라 직접 경험하게 됩니다.\n\n플로깅 마라톤 — 조깅하며 쓰레기 줍기. 운동과 환경 실천을 결합해서 "했다"는 성취감과 SNS 인증이 자연스럽게 나와요. 행사 형태의 캠페인은 참여 자체를 즐거운 경험으로 만들어서 자발적 확산이 일어납니다.'},
  T4_L2_Q3:{q:'아파트 단지나 학교 전체가 함께 참여하는 캠페인이라면?',a:'개인의 실천이 집단의 성과로 합산돼요.\n\n"우리 단지 이번 달 탄소 절감량 1위", "옆 동과 분리수거 경쟁" 같은 구조가 생겨요. 개인으로는 하기 귀찮았던 일이 집단 규범이 되면 자동으로 따라하게 됩니다. 환경 실천을 개인의 의지가 아니라 공동체 문화로 만드는 것이 가장 강력한 지속성을 만들어요.'},
  T4_L2_Q4:{q:'기업 ESG 프로젝트나 정부 정책과 연결한다면?',a:'기업 연결 — "소비자 1,000명이 참여하면 기업이 나무 1,000그루 심기" 같은 구조예요. 참여자에게 "내 행동이 더 큰 변화로 이어진다"는 확신을 줍니다.\n\n정부 정책 연결 — 친환경 행동에 세금 혜택이나 포인트가 생기는 제도적 지원이 생깁니다. 자발성보다 강력한 인센티브 구조예요. 어떤 파트너와 연결하느냐에 따라 캠페인의 지속력이 완전히 달라집니다.'},
  T4_L3_Q1:{q:'환경 위기가 지금 당장 닥친다면 가장 먼저 해야 할 캠페인 행동은?',a:'"지금 내가 할 수 있는 딱 하나"를 즉시 실행하게 만드는 것이에요.\n\n복잡한 교육이나 설득이 아니라, "지금 당장 냉장고에 있는 플라스틱 용기 사진 찍어서 올리기" 같은 즉각적인 행동을 유도합니다. 긴박한 상황에서는 완벽한 캠페인보다 지금 당장 실행 가능한 행동 하나가 더 중요해요.'},
  T4_L3_Q2:{q:'환경 실천을 게임 레벨처럼 만든다면 어떤 경험이 될까?',a:'텀블러 10번 사용하면 "에코 입문자", 100번이면 "그린 히어로" 배지를 받고, 이게 실제 혜택(카페 할인, 기부 연결)으로 이어져요.\n\n친구와 실천량을 비교하고, 동네 랭킹이 생기면 경쟁심이 생깁니다. "환경을 위해 해야 한다"가 아니라 "이기고 싶어서 한다"로 동기가 바뀌면 지속성이 달라져요. 게임화의 핵심은 명확한 목표, 즉각적인 피드백, 사회적 비교입니다.'},
  T4_L3_Q3:{q:'하루에 딱 하나의 친환경 행동만 할 수 있다면 뭘 선택할까?',a:'텀블러 들고 나가기, 엘리베이터 대신 계단, 잔반 없이 먹기. 하나를 고르면 그게 오늘의 미션이 됩니다.\n\n"하루 하나"라는 제약이 생기면 오히려 더 의미 있게 선택하게 돼요. 그리고 하나를 매일 하다 보면 어느 순간 그게 습관이 됩니다. 작은 것 하나가 쌓이는 게 가장 강력한 변화예요.'},
  T4_L3_Q4:{q:'캠페인이 절대 "이렇게 하세요"라고 말하지 않는다면?',a:'대신 질문을 던져요.\n\n"오늘 버린 쓰레기 중에 줄일 수 있었던 게 있었나요?", "지난 한 달 중 가장 환경에 미안했던 순간은 언제예요?" 이 질문에 답하다 보면 스스로 실천 방향을 찾게 됩니다. 설득이 아닌 질문. 행동을 강요하는 게 아니라 스스로 발견하게 만드는 것이 더 깊은 변화를 만들어요.'},
  T4_L4_Q1:{q:'참여하기 편한 캠페인 대신 일부러 불편하게 만든다면?',a:'"친환경 행동을 하기 위해 포기한 것은 무엇인가요?"를 반드시 적게 하거나, 참여 전에 "나는 이 이유로 환경을 지키겠다"는 공개 선언을 요구해요.\n\n쉽게 체크만 하는 캠페인은 가볍게 여기게 되지만, 약간의 노력과 다짐이 들어가면 훨씬 오래 지속됩니다. 심리학에서 말하는 "노력 정당화 효과"예요.'},
  T4_L4_Q2:{q:'행동할 때마다 탄소 감소량을 실시간으로 숫자로 보여준다면?',a:'"텀블러 1번 사용 = 플라스틱 컵 0.03kg 절약 = 탄소 5g 감소". 작은 숫자지만 누적이 보이면 달라집니다.\n\n환경 행동을 데이터로 보여주는 것, 그리고 "내가 이만큼 했다"는 시각적 성취가 지속적인 실천을 만드는 핵심 동기가 됩니다. 숫자로 체감하면 "내 행동이 의미 있다"는 확신이 생겨요.'},
  T4_L4_Q3:{q:'환경 실천을 텍스트 대신 사진이나 그림으로만 인증한다면?',a:'"오늘의 친환경 행동 사진 한 장"이 매일의 미션이에요.\n\n말로 설명하지 않아도 되고, 사진 한 장이 더 직관적으로 전달됩니다. 그 사진들이 모이면 "우리 동네 친환경 아카이브"가 생기고, 시각적으로 변화를 볼 수 있어요. 인증의 방식을 바꾸는 것만으로 캠페인의 참여 경험이 완전히 달라집니다.'},
  T4_L4_Q4:{q:'SNS 인증 기능을 없애면 이 캠페인에 남는 가치는 뭘까?',a:'진짜 실천이에요.\n\n인증을 위해 하는 행동이 아니라, 진짜로 습관이 된 행동만 남습니다. SNS 없이도 지속되는 친환경 실천이 생기면, 그게 바이럴보다 훨씬 강력한 변화예요. "보여주기 위한 친환경"이 아닌 "나를 위한 친환경". 이 가치를 중심으로 캠페인을 재설계하면 완전히 다른 방향이 열립니다.'},

  T4_L5_Q2:{q:'가장 말이 안 되는 환경 캠페인 아이디어만 모으면?',a:'"환경 오염을 더 심하게 해서 직접 느끼게 하기", "친환경 제품 사는 사람에게 벌금 부과하기".\n\n황당하지만 첫 번째에서 "직접 체험형 환경 교육"이라는 진지한 아이디어가 나왔어요. 환경 오염 현장을 직접 보여주는 투어 캠페인이 실제로 효과적이에요. 가장 황당한 아이디어를 뒤집으면, 기존에 없던 가장 임팩트 있는 캠페인이 나올 수 있습니다.'},
  T4_L5_Q3:{q:'인증이나 보상을 절대 주지 않는 캠페인이라면?',a:'보상 없이도 참여하는 사람만 남아요.\n\n처음엔 참여자가 줄겠지만, 남은 사람들은 진짜 동기로 참여하는 사람들입니다. 이 핵심 참여자들이 가장 강력한 입소문을 만들고, 가장 오래 지속해요. "보상 없는 캠페인"이라는 역설이 오히려 "이건 진짜다"라는 신뢰를 만들 수 있습니다.'},
  T4_L5_Q4:{q:'10년 후 이 환경 캠페인이 실패했다면, 그 이유는?',a:'가장 가능성 높은 이유는 "챌린지만 하고 실제 환경은 안 바뀌었다"예요.\n\nSNS 인증은 넘쳐나지만 실제 탄소 배출은 줄지 않고, "그린워싱"이라는 비판을 받으며 신뢰를 잃습니다. 이 실패를 피하려면 — SNS 바이럴과 함께 실제 수치 변화를 추적하고 투명하게 공개하는 구조를 처음부터 설계해야 합니다.'},

  return 0.5;

// ─── ROUTER ──────────────────────────────────────────────────────────────────
function navigate(screenId) {
  state.currentScreen = screenId;
  render();
  const app = document.getElementById('app');
  const sc = app.querySelector('.scroll-content');
  if (sc) sc.scrollTop = 0;
  if (document.activeElement) document.activeElement.blur();
  window.scrollTo(0, 0);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const s = state.currentScreen;
  let html = '';

  if (s === '01_Research_Consent' || s === '01_Research_Consent_Error') html = renderConsent(s);
  else if (s === '02_Participant_Info') html = renderParticipantInfo(state.infoError || false);
  else if (s === '02b_Experiment_Intro') html = renderExperimentIntro();
  else if (s === '03_Task_Selection' || s === '03_Task_Selection_Error') html = renderTaskSelection(s);
  else if (s === '04_Selected_Task_Confirm') html = renderTaskConfirm();
  else if (s === '05_Condition_A_Interface') html = renderCondA();
  else if (s.startsWith('06')) html = renderCondAAnswer(s);
  else if (s === '07_Condition_A_Idea_Input' || s === '07_Condition_A_Idea_Input_Error') html = renderCondAIdea(s);
  else if (s === '08_Condition_A_Evaluation' || s === '08_Condition_A_Evaluation_Error') html = renderCondAEval(s);
  else if (s === '08b_Condition_Transition') html = renderCondTransition();
  else if (s === '09_Condition_B_Interface') html = renderCondB();
  else if (s.startsWith('B_Level') || /^T\d_L\d_Q\d/.test(s)) html = renderCondBAnswer(s);
  else if (s === '11_Condition_B_Idea_Input' || s === '11_Condition_B_Idea_Input_Error') html = renderCondBIdea(s);
  else if (s === '12_Condition_B_Evaluation' || s === '12_Condition_B_Evaluation_Error') html = renderCondBEval(s);
  else if (s === '13_Completion') html = renderCompletion();

  app.innerHTML = html;
  attachEvents(s);
}

function topNav(title, backFn, showBack = true) {
  const progress = getProgress(state.currentScreen);
  return `

      <div class="progress-track"><div class="progress-fill" style="width:${Math.round(progress*100)}%"></div></div>
    </div>`;
}

function choiceGroup(name, options, selectedVal, multi = false) {
  return `<div class="choice-grid">${options.map(opt => {
    const val = typeof opt === 'string' ? opt : opt.value;
    const label = typeof opt === 'string' ? opt : opt.label;
    const sel = selectedVal === val ? 'selected' : '';
    return `<button class="choice-btn ${sel}" onclick="selectChoice('${name}','${val}',${multi})">${label}</button>`;
  }).join('')}</div>`;
}

    condBIdea:  state.condBIdea,

    condBEval2: state.condBEval[1] || '',
    condBEval3: state.condBEval[2] || '',
    condBEval4: state.condBEval[3] || '',
    condBEval5: state.condBEval[4] || '',

  try {

};

window.handleSliderClick = (e) => {
  const track = document.getElementById('slider-track');
  if (!track) return;
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  const level = Math.round(pct * 4) + 1;
  setLevel(level);
};

window.handleSliderTouch = (e) => {
  e.preventDefault();
  e.stopPropagation();
  const track = document.getElementById('slider-track');
  if (!track) return;
  const touch = e.touches[0] || e.changedTouches[0];
  const rect = track.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  const level = Math.round(pct * 4) + 1;
  setLevel(level);
};

window.handleSliderTouchEnd = (e) => {
  e.preventDefault();
};

window.setLevel = (n) => {
  state.condBLevel = n;
  // 슬라이더와 질문 목록만 DOM 업데이트 — 스크롤 위치 유지

  // 1) 슬라이더 fill + thumb 업데이트
  const pct = ((n - 1) / 4 * 100) + '%';
  const fill = document.getElementById('slider-fill');
  if (fill) fill.style.width = pct;
  const thumb = document.getElementById('slider-thumb');
  if (thumb) thumb.style.left = pct;

  // 2) 단계 숫자 active 표시 업데이트
  document.querySelectorAll('.slider-step').forEach(el => {
    el.classList.toggle('active', parseInt(el.textContent.trim()) === n);
  });

  // 3) 후속 질문 섹션 제목 업데이트
  const secLabel = document.querySelector('.q-section-label');
  if (secLabel) secLabel.textContent = '후속 질문 — ' + n + '단계';

  const questions = getTaskBQuestions(state.selectedTask, n);
  const qList = document.getElementById('b-question-list');
  if (qList) {
    qList.innerHTML = questions.map(q =>
      '<div class="q-card" onclick="navigateFromList(\'' + q.screen + '\', \'09_Condition_B_Interface\')">' +
        '<div style="flex:1"><div class="q-card-text">' + q.text + '</div></div>' +
        '<div class="q-card-arrow">›</div>' +
      '</div>'
    ).join('');
  }
};

// ─── 스크롤 위치 보존 네비게이션 ─────────────────────────────────────────────
// 질문 카드 클릭 시: 현재 스크롤 위치 저장 후 답변 화면으로 이동
window.navigateFromList = (screenId, returnScreen) => {
  const app = document.getElementById('app');
  const sc = app ? app.querySelector('.scroll-content') : null;
  state._savedScrollPos = sc ? sc.scrollTop : 0;
  state._savedScrollReturn = returnScreen;
  navigate(screenId);
};

// 돌아가기 버튼: 저장된 스크롤 위치로 복원
window.navigateBack = (screenId) => {
  const savedPos = state._savedScrollReturn === screenId ? (state._savedScrollPos || 0) : 0;
  navigate(screenId);
  if (savedPos > 0) {
    const app = document.getElementById('app');
    const sc = app ? app.querySelector('.scroll-content') : null;
    if (sc) setTimeout(() => { sc.scrollTop = savedPos; }, 0);
  }
  state._savedScrollPos = 0;
  state._savedScrollReturn = null;
};

window.navigate = navigate;

window.updateCharCount = (taId, countId, max) => {
  const ta = document.getElementById(taId);
  const cnt = document.getElementById(countId);
  if (ta && cnt) cnt.textContent = `${ta.value.length}/${max}`;
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
