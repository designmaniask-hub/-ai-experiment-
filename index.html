<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>생성형 AI 후속질문 연구 참여 안내</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --w: 393px;
    --h: 852px;
    --bg: #ffffff;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-tertiary: #999999;
    --border: #e0e0e0;
    --border-light: #f0f0f0;
    --surface: #f8f8f8;
    --surface-hover: #f2f2f2;
    --accent: #1A1A1A;
    --progress-bg: #ebebeb;
    --progress-fill: #111111;
    --error-color: #d9534f;
    --error-bg: #fff5f5;
    --error-border: #f5a8a6;
    --btn-primary-bg: #1A1A1A;
    --btn-primary-text: #ffffff;
    --card-radius: 12px;
    --input-radius: 10px;
    --btn-radius: 10px;
    --selected-bg: #1A1A1A;
    --selected-text: #ffffff;
    --tag-bg: #f4f4f4;
    --tag-text: #444444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #d8d8d8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* 실제 모바일 기기 접속 시 셸 숨기고 전체화면 */
  @media (max-width: 500px) {
    body {
      background: #ffffff;
      padding: 0;
      align-items: flex-start;
    }
    .device-shell {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    .device-shell::before,
    .device-shell::after {
      display: none !important;
    }
    /* 모바일에서 상태바 숨김 */
    .status-bar {
      display: none !important;
    }
    /* 상태바 없어진 만큼 상단 여백 줄임 */
    .top-nav {
      padding-top: 12px !important;
    }
  }

  .device-shell {
    width: var(--w);
    height: var(--h);
    background: var(--bg);
    border-radius: 50px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3), 0 0 0 7px #1a1a1a, 0 0 0 8.5px #3a3a3a;
    overflow: hidden;
    position: relative;
  }
  .device-shell::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #1a1a1a;
    border-radius: 0 0 20px 20px;
    z-index: 100;
  }
  .device-shell::after {
    content: '';
    position: absolute;
    top: 10px; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px;
    background: #2a2a2a;
    border-radius: 50%;
    box-shadow: 0 0 0 2px #111, 40px 0 0 0 #333;
    z-index: 101;
  }

  .screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    background: var(--bg);
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 38px 28px 8px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 5px; align-items: center; font-size: 12px; color: var(--text-primary); }

  /* Top Nav */
  .top-nav {
    display: flex;
    align-items: center;
    padding: 6px 20px 10px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-back:active { background: var(--surface); }
  .nav-back svg { width: 20px; height: 20px; }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.4px;
    white-space: nowrap;
  }
  .nav-spacer { width: 36px; flex-shrink: 0; }

  /* Progress Bar */
  .progress-wrap {
    padding: 0 20px 0;
    flex-shrink: 0;
    margin-bottom: 4px;
  }
  .progress-track {
    height: 2.5px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--progress-fill);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Scrollable Content */
  .scroll-content {
    flex: 1;
    overflow-y: scroll;
    padding: 0 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    min-height: 0;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Fade bottom */
  .scroll-wrap {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: visible;
  }
  .scroll-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(to top, rgba(255,255,255,0.95), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* Bottom CTA */
  .bottom-area {
    padding: 12px 20px 28px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--btn-primary-bg);
    color: var(--btn-primary-text);
    border: none;
    border-radius: var(--btn-radius);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }

  .btn-outline {
    width: 100%;
    padding: 15px;
    background: transparent;
    color: var(--text-primary);
    border: 1.5px solid var(--border);
    border-radius: var(--btn-radius);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.3px;
    margin-top: 10px;
    transition: background 0.15s;
  }
  .btn-outline:active { background: var(--surface); }

  /* Section Title */
  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.6px;
    margin-bottom: 6px;
    padding-top: 12px;
  }
  .section-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 24px;
    letter-spacing: -0.2px;
  }

  /* Card */
  .card {
    background: var(--bg);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .card-label {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .card-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.65;
    letter-spacing: -0.2px;
  }
  .card-selected {
    border-color: var(--accent);
    background: var(--surface);
  }

  /* Form Groups */
  .form-group {
    margin-bottom: 22px;
  }
  .form-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
    display: block;
    letter-spacing: -0.2px;
  }
  .form-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 6px;
    line-height: 1.5;
    letter-spacing: -0.1px;
  }

  /* Choice Buttons */
  .choice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .choice-btn {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    background: var(--bg);
    font-family: inherit;
    font-size: 13.5px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.2px;
    font-weight: 400;
  }
  .choice-btn:active { opacity: 0.7; }
  .choice-btn.selected {
    background: #1A1A1A;
    color: #FFFFFF;
    border-color: #1A1A1A;
  }

  /* Text Input */
  .text-input {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--input-radius);
    font-family: inherit;
    font-size: 16px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: -0.2px;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input::placeholder { color: var(--text-tertiary); }
  .text-input.error-input { border-color: var(--error-color); }

  .textarea-wrap { position: relative; }
  .text-textarea {
    width: 100%;
    min-height: 200px;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--input-radius);
    font-family: inherit;
    font-size: 16px;
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    resize: none;
    line-height: 1.7;
    transition: border-color 0.2s;
    letter-spacing: -0.2px;
  }
  .text-textarea:focus { border-color: var(--accent); }
  .text-textarea::placeholder { color: var(--text-tertiary); }
  .text-textarea.error-input { border-color: var(--error-color); }
  .char-count {
    position: absolute;
    bottom: 10px; right: 12px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* Error Message */
  .error-msg {
    display: none;
    font-size: 12.5px;
    color: var(--error-color);
    margin-top: 8px;
    letter-spacing: -0.2px;
    line-height: 1.5;
  }
  .error-msg.visible { display: block; }

  /* Consent */
  .consent-box {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 16px;
    max-height: 240px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .consent-box::-webkit-scrollbar { display: none; }
  .consent-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
    letter-spacing: -0.1px;
  }
  .consent-check-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 0;
    border-top: 1px solid var(--border-light);
    cursor: pointer;
  }
  .custom-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .custom-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .custom-check.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px);
    display: block;
  }
  .check-label {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.5;
    letter-spacing: -0.2px;
  }

  /* Task Cards */
  .task-card {
    border: 1.5px solid var(--border-light);
    border-left: 4px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .task-card:active { background: #f0f4ff; }
  .task-card.selected {
    border-color: #4a7cdc;
    border-left-color: #4a7cdc;
    background: #f0f4ff;
  }
  .task-card .check-badge {
    display: none;
    position: absolute;
    top: 14px; right: 14px;
    width: 26px; height: 26px;
    background: #4a7cdc;
    border-radius: 50%;
    align-items: center; justify-content: center;
  }
  .task-card.selected .check-badge { display: flex; }
  .task-card .check-badge::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(40deg) translateY(-1px);
    display: block;
  }
  .task-num {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .task-card.selected .task-num { color: #4a7cdc; }
  .task-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    padding-right: 36px;
  }
  .task-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    letter-spacing: -0.1px;
  }

  /* Question Cards */
  .q-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .q-section-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .q-section-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .q-card {
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.15s;
    border-left: 3px solid var(--border-light);
  }
  .q-card:active { background: var(--surface); }
  .q-card:hover { border-left-color: var(--accent); }
  .q-card-text {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.6;
    flex: 1;
    letter-spacing: -0.2px;
  }
  .q-card-arrow {
    color: var(--text-tertiary);
    font-size: 14px;
    flex-shrink: 0;
  }
  .q-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--tag-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 4px;
    letter-spacing: 0.1px;
    font-weight: 500;
  }

  /* Slider / Bar for Condition B */
  .slider-section {
    margin-bottom: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: var(--card-radius);
    border: 1.5px solid var(--border-light);
  }
  .slider-touch-area {
    padding: 14px 0;
    margin: -14px 0;
    cursor: pointer;
    touch-action: none;
  }
  .slider-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .slider-desc {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 16px;
    line-height: 1.5;
    letter-spacing: -0.1px;
  }
  .slider-wrapper {
    position: relative;
    padding: 8px 0;
  }
  .slider-track {
    height: 6px;
    background: #e0e0e0;
    border-radius: 6px;
    position: relative;
    margin: 8px 10px;
    cursor: pointer;
    touch-action: none;
  }
  .slider-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: #666666;
    border-radius: 6px;
    transition: width 0.2s;
    z-index: 1;
  }
  .slider-steps {
    display: flex;
    justify-content: space-between;
    margin: 0 10px;
    margin-top: 10px;
  }
  .slider-step {
    font-size: 12px;
    color: var(--text-tertiary);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    width: 20px;
    text-align: center;
  }
  .slider-step.active {
    color: var(--text-primary);
    font-weight: 800;
    font-size: 15px;
  }
  .slider-knob-row {
    position: absolute;
    top: 0; left: 10px; right: 10px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .slider-knob-pos {
    width: 20px;
    height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: all;
  }
  .slider-knob {
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: transform 0.2s;
    display: none;
  }
  .slider-knob.visible { display: block; }
  .slider-thumb {
    position: absolute;
    top: 50%; transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    background: #444444;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    pointer-events: none;
    transition: left 0.15s;
    z-index: 3;
  }
  .slider-end-labels {
    display: flex;
    justify-content: space-between;
    margin: 6px 10px 0;
  }
  .slider-end-label {
    font-size: 10px;
    color: var(--text-tertiary);
    letter-spacing: -0.1px;
  }

  /* Evaluation */
  .eval-item {
    margin-bottom: 18px;
    padding: 14px;
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    transition: border-color 0.2s;
  }
  .eval-item.error-item { border-color: var(--error-border); background: var(--error-bg); }
  .eval-q {
    font-size: 13.5px;
    color: var(--text-primary);
    line-height: 1.6;
    margin-bottom: 14px;
    letter-spacing: -0.2px;
  }
  .eval-scale {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .eval-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    letter-spacing: -0.1px;
  }
  .eval-nums {
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .eval-num {
    flex: 1;
    padding: 9px 4px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .eval-num.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* AI Response */
  .ai-card {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .ai-card-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ai-card-body {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.75;
    letter-spacing: -0.2px;
  }

  /* Selected Q display */
  .selected-q-card {
    background: var(--surface);
    border: 1.5px solid var(--border-light);
    border-left: 3px solid var(--accent);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .selected-q-label {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .selected-q-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.65;
    letter-spacing: -0.2px;
    font-weight: 500;
  }

  /* Completion */
  .completion-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    text-align: center;
  }
  .completion-icon {
    width: 64px; height: 64px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    font-size: 28px;
  }
  .completion-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.6px;
    margin-bottom: 10px;
  }
  .completion-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    letter-spacing: -0.2px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border-light);
    margin: 16px 0;
  }

  /* Info Badge */
  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-secondary);

function getProgress(screenId) {
  if (PROGRESS[screenId]) return PROGRESS[screenId];
  if (screenId.startsWith('B_Level')) return 10/16;
  return 0.5;
}

window.COND_B_QUESTIONS = COND_B_QUESTIONS;

// ─── ROUTER ──────────────────────────────────────────────────────────────────
function navigate(screenId) {
  state.currentScreen = screenId;
  render();
  const app = document.getElementById('app');
  const sc = app.querySelector('.scroll-content');
  if (sc) sc.scrollTop = 0;
  if (document.activeElement) document.activeElement.blur();
  window.scrollTo(0, 0);
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const s = state.currentScreen;
  let html = '';

  if (s === '01_Research_Consent' || s === '01_Research_Consent_Error') html = renderConsent(s);
  else if (s === '02_Participant_Info') html = renderParticipantInfo(state.infoError || false);
  else if (s === '02b_Experiment_Intro') html = renderExperimentIntro();
  else if (s === '03_Task_Selection' || s === '03_Task_Selection_Error') html = renderTaskSelection(s);
  else if (s === '04_Selected_Task_Confirm') html = renderTaskConfirm();
  else if (s === '05_Condition_A_Interface') html = renderCondA();
  else if (s.startsWith('06')) html = renderCondAAnswer(s);
  else if (s === '07_Condition_A_Idea_Input' || s === '07_Condition_A_Idea_Input_Error') html = renderCondAIdea(s);
  else if (s === '08_Condition_A_Evaluation' || s === '08_Condition_A_Evaluation_Error') html = renderCondAEval(s);
  else if (s === '08b_Condition_Transition') html = renderCondTransition();
  else if (s === '09_Condition_B_Interface') html = renderCondB();
  else if (s.startsWith('B_Level')) html = renderCondBAnswer(s);
  else if (s === '11_Condition_B_Idea_Input' || s === '11_Condition_B_Idea_Input_Error') html = renderCondBIdea(s);
  else if (s === '12_Condition_B_Evaluation' || s === '12_Condition_B_Evaluation_Error') html = renderCondBEval(s);
  else if (s === '13_Completion') html = renderCompletion();

  app.innerHTML = html;
  attachEvents(s);
}

function choiceGroup(name, options, selectedVal, multi = false) {
  return `<div class="choice-grid">${options.map(opt => {
    const val = typeof opt === 'string' ? opt : opt.value;
    const label = typeof opt === 'string' ? opt : opt.label;
    const sel = selectedVal === val ? 'selected' : '';
    return `<button class="choice-btn ${sel}" onclick="selectChoice('${name}','${val}',${multi})">${label}</button>`;
  }).join('')}</div>`;
}

  'B_Level5_Q4_Answer': { q: '10년 후 이 방법이 완전히 실패했다면, 그 이유는 뭐였을까?', a: '미래의 실패 시나리오를 상상하면 현재의 맹점이 보입니다.\n\n반려동물 서비스가 10년 후 실패한다면 — "너무 많은 앱이 생기면서 보호자들이 앱 피로를 느꼈다. 결국 믿을 수 있는 동네 수의사 한 명과의 관계로 돌아갔다." 환경 캠페인이 10년 후 실패한다면 — "참여자들이 챌린지에는 열심히 참여했지만 실제 생활 습관은 변하지 않았다. 캠페인은 SNS 콘텐츠가 됐지만 환경은 나빠졌다."\n\n이 실패 시나리오에서 지금 당장 피해야 할 것이 보이시나요? 실패 이유를 알면 지금 설계에서 무엇을 조심해야 할지 알 수 있습니다.' },

window.handleSliderClick = (e) => {
  const track = document.getElementById('slider-track');
  if (!track) return;
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  const level = Math.round(pct * 4) + 1;
  setLevel(level);
};

window.handleSliderTouch = (e) => {
  e.preventDefault();
  e.stopPropagation();
  const track = document.getElementById('slider-track');
  if (!track) return;
  const touch = e.touches[0] || e.changedTouches[0];
  const rect = track.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  const level = Math.round(pct * 4) + 1;
  setLevel(level);
};

window.handleSliderTouchEnd = (e) => {
  e.preventDefault();
};

window.setLevel = (n) => {
  state.condBLevel = n;
  // 슬라이더와 질문 목록만 DOM 업데이트 — 스크롤 위치 유지

  // 1) 슬라이더 fill + thumb 업데이트
  const pct = ((n - 1) / 4 * 100) + '%';
  const fill = document.getElementById('slider-fill');
  if (fill) fill.style.width = pct;
  const thumb = document.getElementById('slider-thumb');
  if (thumb) thumb.style.left = pct;

  // 2) 단계 숫자 active 표시 업데이트
  document.querySelectorAll('.slider-step').forEach(el => {
    el.classList.toggle('active', parseInt(el.textContent.trim()) === n);
  });

  // 3) 후속 질문 섹션 제목 업데이트
  const secLabel = document.querySelector('.q-section-label');
  if (secLabel) secLabel.textContent = '후속 질문 — ' + n + '단계';

  // 4) 질문 카드 목록 업데이트
  const qList = document.getElementById('b-question-list');
  if (qList) {
    const questions = window.COND_B_QUESTIONS[n];
    qList.innerHTML = questions.map(q =>
      '<div class="q-card" onclick="navigateFromList(\'' + q.screen + '\', \'09_Condition_B_Interface\')">' +
        '<div style="flex:1"><div class="q-card-text">' + q.text + '</div></div>' +
        '<div class="q-card-arrow">›</div>' +
      '</div>'
    ).join('');
  }
};

// 질문 카드 클릭 시: 현재 스크롤 위치 저장 후 답변 화면으로 이동
window.navigateFromList = (screenId, returnScreen) => {
  const app = document.getElementById('app');
  const sc = app ? app.querySelector('.scroll-content') : null;
  state._savedScrollPos = sc ? sc.scrollTop : 0;
  state._savedScrollReturn = returnScreen;
  navigate(screenId);
};

// 돌아가기 버튼: 저장된 스크롤 위치로 복원
window.navigateBack = (screenId) => {
  const savedPos = state._savedScrollReturn === screenId ? (state._savedScrollPos || 0) : 0;
  navigate(screenId);
  if (savedPos > 0) {
    const app = document.getElementById('app');
    const sc = app ? app.querySelector('.scroll-content') : null;
    if (sc) setTimeout(() => { sc.scrollTop = savedPos; }, 0);
  }
  state._savedScrollPos = 0;
  state._savedScrollReturn = null;
};

  const ta = document.getElementById(taId);
  const cnt = document.getElementById(countId);
  if (ta && cnt) cnt.textContent = `${ta.value.length}/${max}`;
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
